services:
  # 1. Database Bán hàng (MySQL 8.0)
  mysql:
    image: mysql:8.0
    container_name: noah_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: webstore
    expose:
      - "3306"
    volumes:
      - ./init_db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # 2. Database Tài chính (PostgreSQL 15)
  postgres:
    image: postgres:15
    container_name: noah_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: finance
    expose:
      - "5432"
    volumes:
      - ./init_db/init_postgres.sql:/docker-entrypoint-initdb.d/init_postgres.sql:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # 3. Message Broker (RabbitMQ 3)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: noah_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: noah
      RABBITMQ_DEFAULT_PASS: noahpassword
    ports:
      - "5672:5672"     # Cổng để nhận/gửi tin nhắn
      - "15672:15672"   # Cổng để mở giao diện Web xem tin nhắn
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # 4. Module 2A: Order API (Producer)
  order_api:
    build: ./module_2/Modul_2A
    container_name: noah_order_api
    environment:
      PYTHONUNBUFFERED: 1
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: webstore
      DB_USER: root
      DB_PASSWORD: rootpassword
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: noah
      RABBITMQ_PASSWORD: noahpassword
      RABBITMQ_QUEUE: order_queue
      CONNECT_RETRY_ATTEMPTS: 10
      CONNECT_RETRY_DELAY_SECONDS: 3
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - "5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: on-failure

  # 5. Module 2B: Order Worker (Consumer)
  order-worker:
    build: ./module_2/Modul_2B
    container_name: noah_order_worker
    environment:
      PYTHONUNBUFFERED: 1
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: webstore
      DB_USER: root
      DB_PASSWORD: rootpassword
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: finance
      PG_USER: postgres
      PG_PASSWORD: rootpassword
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: noah
      RABBITMQ_PASSWORD: noahpassword
      RABBITMQ_QUEUE: order_queue
      CONNECT_RETRY_ATTEMPTS: 10
      CONNECT_RETRY_DELAY_SECONDS: 3
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # 5. Module 3: Report Service
  report-service:
    build: ./module_3/report-service
    container_name: noah_report
    environment:
      PYTHONUNBUFFERED: 1
      MYSQL_URL: mysql+pymysql://root:rootpassword@mysql:3306/webstore
      POSTGRES_URL: postgresql+psycopg2://postgres:rootpassword@postgres:5432/finance
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
    expose:
      - "5001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: on-failure

  # 6. Module 3: Dashboard UI
  dashboard:
    build: ./module_3/noah-dashboard
    container_name: noah_dashboard
    environment:
      VITE_API_URL: ""
      VITE_PROXY_TARGET: http://kong:8000
      VITE_PROXY_APIKEY: noah-secret-key
    depends_on:
      - kong
    ports:
      - "3000:3000"

  # 7. Cổng bảo mật (Kong Gateway)
  kong:
    image: kong:latest
    container_name: noah_kong
    environment:
      KONG_DATABASE: "off"  # Cấu hình chạy không cần DB riêng (DB-less mode)
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: "off"
    ports:
      - "8000:8000"
    volumes:
      - ./kong.yml:/usr/local/kong/declarative/kong.yml:ro
    depends_on:
      order_api:
        condition: service_healthy
      report-service:
        condition: service_healthy
    restart: on-failure

  # 8. Module 1: Đồng bộ kho (Legacy Adapter)
  legacy_adapter:
    build: ./module_1
    container_name: noah_legacy_adapter
    environment:
      PYTHONUNBUFFERED: 1
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./data_volumes/input:/app/input
      - ./data_volumes/processed:/app/processed
      - ./data_volumes/error:/app/error
    restart: on-failure

volumes:
  mysql_data:
  postgres_data:
